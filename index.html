<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBAN CASA | Firebase Task Manager</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --todo: #f1c40f;
            --progress: #3498db; --done: #2ecc71; --alert: #e74c3c; --bg: #f4f7f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: #333; }

        /* Login & UI */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .login-box { background: white; padding: 30px; border-radius: 12px; width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; display: none; }
        header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* Task Cards */
        .task-board { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .task-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 8px solid #ccc; transition: 0.3s; }
        .card-todo { border-top-color: var(--todo); }
        .card-progress { border-top-color: var(--progress); }
        .card-done { border-top-color: var(--done); }
        .task-notes { width: 100%; height: 60px; margin: 10px 0; border: 1px solid #f0f0f0; padding: 8px; border-radius: 6px; background: #fafafa; font-size: 0.9em; resize: none; }
        .post-update-btn { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Alert */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:4000; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:25px; border-radius:12px; width:90%; max-width:400px; text-align: center; }
        .alert-btn { background: var(--alert); color: white; padding: 12px 25px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>URBAN CASA</h2>
        <input type="password" id="passIn" placeholder="Enter Admin Pin (1234)">
        <button onclick="login()">Sync & Enter</button>
    </div>
</div>

<div class="container" id="mainApp">
    <header>
        <h2>Project Dashboard</h2>
        <button onclick="triggerAlert()" style="padding: 8px 15px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer;">🔔 Signal Team</button>
    </header>

    <div style="background:white; padding:20px; border-radius:12px; margin-bottom:20px;">
        <form id="taskForm" style="display:flex; flex-wrap:wrap; gap:10px;">
            <input type="text" id="tTitle" placeholder="Task Detail" required style="flex:2; padding:10px; border:1px solid #ddd; border-radius:6px;">
            <select id="tUser" style="flex:1; padding:10px; border:1px solid #ddd; border-radius:6px;">
                <option>Sagar</option><option>Suman</option>
            </select>
            <input type="datetime-local" id="tDate" required style="flex:1; padding:10px; border:1px solid #ddd; border-radius:6px;">
            <button type="submit" style="background:var(--accent); color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold;">Assign</button>
        </form>
    </div>

    <div class="task-board" id="taskBoard"></div>
</div>

<div class="modal" id="notificationModal">
    <div class="modal-content">
        <h2 style="color: var(--alert);">Team Update Required!</h2>
        <p>Please check your assigned tasks and post updates now.</p>
        <button class="alert-btn" onclick="dismissAlert()">Acknowledge</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY_HERE", // Found in Firebase Project Settings
        databaseURL: "https://task-76764-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function login() {
        if(document.getElementById('passIn').value === '1234') {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            syncTasks(); // Initial Load
        }
    }

    // --- REALTIME SYNC ---
    function syncTasks() {
        db.ref('tasks').on('value', (snapshot) => {
            const data = snapshot.val();
            const board = document.getElementById('taskBoard');
            board.innerHTML = '';
            
            if (data) {
                Object.keys(data).forEach(key => {
                    const t = data[key];
                    const card = document.createElement('div');
                    card.className = `task-card card-${t.status}`;
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between;">
                            <strong>${t.title}</strong>
                            <button onclick="deleteTask('${key}')" style="border:none; background:none; cursor:pointer; color:#ccc;">✖</button>
                        </div>
                        <p style="font-size:0.8em; color:#666; margin:5px 0;">👤 ${t.assignee} | ⏰ ${t.date}</p>
                        <textarea id="note-${key}" class="task-notes">${t.notes || ''}</textarea>
                        <select id="status-${key}" style="width:100%; padding:8px; margin-bottom:10px; border-radius:4px;">
                            <option value="todo" ${t.status==='todo'?'selected':''}>To Do</option>
                            <option value="progress" ${t.status==='progress'?'selected':''}>In Progress</option>
                            <option value="done" ${t.status==='done'?'selected':''}>Done</option>
                        </select>
                        <button class="post-update-btn" onclick="postUpdate('${key}')">Post Update</button>
                    `;
                    board.appendChild(card);
                });
            }
        });
    }

    // --- ACTIONS ---
    document.getElementById('taskForm').onsubmit = (e) => {
        e.preventDefault();
        const newTask = {
            title: document.getElementById('tTitle').value,
            assignee: document.getElementById('tUser').value,
            date: document.getElementById('tDate').value,
            status: 'todo',
            notes: ''
        };
        db.ref('tasks').push(newTask);
        e.target.reset();
    };

    function postUpdate(id) {
        const notes = document.getElementById(`note-${id}`).value;
        const status = document.getElementById(`status-${id}`).value;
        db.ref('tasks/' + id).update({ notes, status });
        alert("Update Synced!");
    }

    function deleteTask(id) {
        if(confirm("Delete task?")) db.ref('tasks/' + id).remove();
    }

    function triggerAlert() {
        document.getElementById('notificationModal').style.display = 'flex';
        if ("vibrate" in navigator) navigator.vibrate([400, 200, 400]);
    }

    function dismissAlert() {
        document.getElementById('notificationModal').style.display = 'none';
    }
</script>
</body>
</html>
